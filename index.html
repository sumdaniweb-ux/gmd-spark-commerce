<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMD Spark | Ultra-Premium</title>
    
    <style>
        :root { --accent: #FF6600; --bg: #030407; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            background: radial-gradient(circle at center, #111827 0%, #030407 100%);
            color: white; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            align-items: center; 
            padding: 20px;
            overflow: hidden;
        }

        /* اینیمیٹڈ بیک گراؤنڈ ذرات */
        .particles {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(var(--accent) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            animation: move 20s linear infinite;
        }
        @keyframes move { from { transform: translateY(0); } to { transform: translateY(-500px); } }

        .premium-card {
            width: 100%;
            max-width: 390px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 3px;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            border: 1px solid rgba(255,102,0,0.2);
        }

        /* گھومتا ہوا جادوئی بارڈر */
        .premium-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--accent), transparent, var(--accent), transparent);
            animation: rotate 4s linear infinite;
            z-index: -1;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .inner {
            background: #050505;
            border-radius: 47px;
            padding: 40px 20px;
            text-align: center;
        }

        .logo-glow {
            width: 115px; height: 115px;
            margin: 0 auto 20px;
            border-radius: 30px;
            padding: 3px;
            background: linear-gradient(45deg, var(--accent), #fff);
            box-shadow: 0 0 40px rgba(255,102,0,0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .logo { width: 100%; height: 100%; border-radius: 27px; background: #000; }
        .brand { font-size: 28px; font-weight: 900; letter-spacing: 3px; margin-bottom: 30px; }

        .f-box { 
            background: linear-gradient(90deg, #FF6600, #FF4400);
            color: white; 
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            box-shadow: 0 10px 20px rgba(255, 68, 0, 0.2);
            border-left: 5px solid white;
            transition: 0.3s;
        }
        .f-box:hover { transform: translateX(-10px); background: #fff; color: #ff6600; text-shadow: none; }

        .btn-main {
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 900;
            text-decoration: none;
            display: block;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .btn-wa {
            background: #25D366;
            color: white;
            padding: 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 900;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: wa-pulse 1.5s infinite;
        }
        @keyframes wa-pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }
    </style>
</head>
<body>
    <div class="particles"></div>
    <div class="premium-card">
        <div class="inner">
            <div class="logo-glow">
                <img src="https://i.ibb.co/XrLX7kXC/Gemini-Generated-Image-d70jwud70jwud70j.png" class="logo">
            </div>
            <div class="brand">GMD SPARK</div>
            
            <div class="f-list">
                <div class="f-box">CREATIVE TESTING FRAMEWORK <span>PRO</span></div>
                <div class="f-box">META & GOOGLE ADS SCALING <span>PRO</span></div>
                <div class="f-box">TIKTOK ADS STRATEGY <span>PRO</span></div>
                <div class="f-box">4.3 ROAS CASE STUDY <span>WIN</span></div>
            </div>

            <div style="margin-top: 30px;">
                <a href="mailto:contact@gmdspark.com" class="btn-main">BOOK AUDIT</a>
                <a href="https://wa.me/923000000000" class="btn-wa">WHATSAPP CHAT</a>
            </div>
        </div>
    </div>
</body>
</html>
